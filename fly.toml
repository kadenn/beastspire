# Rooms live in memory, so this app must stay SINGLE-machine (no horizontal scaling).
# It scales to zero when idle via "suspend" (freezes RAM, so in-memory rooms survive
# the idle period; clients reconnect via their per-tab token on resume).
app = "beastspire"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
